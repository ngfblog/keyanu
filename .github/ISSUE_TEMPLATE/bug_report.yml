name: Bug Report
description: Something in Keyanu isn't working as expected.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please don't include any
        real secrets, credentials, or personal data in this report — sanitize
        examples first.

        **Found a security vulnerability?** Please don't file it here — see
        [SECURITY.md](https://github.com/nirgf/keyanu/security/policy) for
        private reporting instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click "Add credential" and select SSH Key Pair, the form...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Keyanu version
      description: Shown in Settings > About, or the image tag you're running.
      placeholder: "0.1.0 / nirgf/keyanu:latest"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Unraid (Community Applications template)
        - Docker (docker run)
        - Docker Compose (local dev setup)
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if this is a UI issue)
      placeholder: Chrome 126 on macOS

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >-
        Container logs (`docker logs keyanu`), if relevant. Please remove any
        secrets before pasting.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
