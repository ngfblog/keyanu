name: Feature Request
description: Suggest an idea or improvement for Keyanu.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a large feature, it's worth skimming
        [ROADMAP.md](https://github.com/nirgf/keyanu/blob/main/ROADMAP.md) —
        it might already be planned, or explicitly out of scope for v1
        (Keyanu is a deliberately single-user tool for now).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that Keyanu doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Credentials / templates
        - Systems / Workspaces
        - Files
        - Notes
        - Search
        - Security (auth, TOTP, sessions)
        - Backup & Restore
        - Settings / Appearance
        - Deployment (Docker, Unraid)
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
