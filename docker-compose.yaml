services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: keyanu-backend:latest
    container_name: keyanu-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-please-this-is-not-secure-for-production-use}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-please-this-is-not-secure-for-production-use}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      DATA_DIR: /data
      ENVIRONMENT: production
    volumes:
      - keyanu-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: keyanu-frontend:latest
    container_name: keyanu-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KEYANU_PORT:-8420}:80"

volumes:
  keyanu-data:
    driver: local
