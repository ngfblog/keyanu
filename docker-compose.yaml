# ----------------------------------------------------------------------
# LOCAL DEVELOPMENT ONLY.
#
# This runs the backend and frontend as two separate containers with live
# rebuilds from source, which is convenient while developing.
#
# For production, use the single combined image instead (built from the
# repo-root Dockerfile, published as nirgf/keyanu:latest) -- see the root
# README's "Quick start" and "Unraid" sections. That image needs one
# container, one port, and one volume; this file needs two of each plus a
# shared Docker network, which is unnecessary complexity for running it.
# ----------------------------------------------------------------------
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: keyanu-backend:latest
    container_name: keyanu-backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-please-this-is-not-secure-for-production-use}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-please-this-is-not-secure-for-production-use}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-please}
      DATA_DIR: ${DATA_DIR:-/data}
      DEFAULT_SESSION_TIMEOUT_MINUTES: ${DEFAULT_SESSION_TIMEOUT_MINUTES:-720}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_VERSION: ${APP_VERSION:-dev}
    volumes:
      - keyanu-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: keyanu-frontend:latest
    container_name: keyanu-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KEYANU_PORT:-8420}:80"

volumes:
  keyanu-data:
    driver: local
